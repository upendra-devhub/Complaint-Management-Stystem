<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Complaints</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/animations.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/form.css">
    <link rel="stylesheet" href="../../assets/css/sidebar.css">
    <link rel="stylesheet" href="../../assets/css/table.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body data-role="admin" data-page="complaints" data-title="Complaint Management">
    <div class="page-backdrop"></div>
    <div id="toast-root"></div>
    <div class="app-shell">
        <aside class="app-sidebar"></aside>
        <div class="app-frame">
            <header class="topbar"></header>
            <main class="page-content reveal">
                <section class="page-title">
                    <span class="eyebrow">Admin Module</span>
                    <h1>Complaints</h1>
                </section>
                <section class="panel-card">
                    <div class="section-head">
                        <div><h2>All Complaints</h2></div>
                        <button class="btn btn-secondary filter-toggle-btn" id="filterToggleBtn">
                            <i class="ph ph-funnel"></i> Filter
                        </button>
                    </div>
                    <div class="filter-panel" id="filterPanel">
                        <div class="filter-panel-inner">
                            <div class="filter-group">
                                <span class="filter-group-label">Status</span>
                                <div class="filter-chips" id="statusFilterChips">
                                    <button class="filter-chip active" data-status="all">All</button>
                                    <button class="filter-chip" data-status="Pending">
                                        <span class="filter-dot dot-pending"></span> Pending
                                    </button>
                                    <button class="filter-chip" data-status="Assigned">
                                        <span class="filter-dot dot-assigned"></span> Assigned
                                    </button>
                                    <button class="filter-chip" data-status="In Progress">
                                        <span class="filter-dot dot-progress"></span> In Progress
                                    </button>
                                    <button class="filter-chip" data-status="Resolved">
                                        <span class="filter-dot dot-resolved"></span> Resolved
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="adminComplaintsTable"></div>
                </section>
            </main>
        </div>
    </div>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/authGuard.js"></script>
    <script src="../../assets/js/realtime.js"></script>
    <script src="../../assets/js/complaints.js"></script>
<script src="../../assets/js/animations.js"></script>
</body>
</html>
