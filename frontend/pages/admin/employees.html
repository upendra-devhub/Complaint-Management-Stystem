<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/animations.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/form.css">
    <link rel="stylesheet" href="../../assets/css/sidebar.css">
    <link rel="stylesheet" href="../../assets/css/table.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body data-role="admin" data-page="employees" data-title="Employee Management">
    <div class="page-backdrop"></div>
    <div id="toast-root"></div>
    <div class="app-shell">
        <aside class="app-sidebar"></aside>
        <div class="app-frame">
            <header class="topbar"></header>
            <main class="page-content">
                <section class="page-title">
                    <span class="eyebrow">Admin Module</span>
                    <h1>Manage employees and access.</h1>
                    <p>Create new employee accounts, maintain department mapping, and keep assignment capacity healthy.</p>
                </section>
                <section class="two-column">
                    <article class="panel-card">
                        <div class="section-head"><div><h2>Create or update employee</h2><p>Employee registration is admin-only in this system.</p></div></div>
                        <form id="employeeForm" class="form-grid">
                            <input type="hidden" name="employeeId">
                            <div class="form-row">
                                <div class="form-field">
                                    <label for="name">Full Name</label>
                                    <input class="field-control" id="name" name="name" type="text" placeholder="Employee name" required>
                                </div>
                                <div class="form-field">
                                    <label for="phone">Phone</label>
                                    <input class="field-control" id="phone" name="phone" type="text" placeholder="Phone number" required>
                                </div>
                            </div>
                            <div class="form-field">
                                <label for="email">Email Address</label>
                                <input class="field-control" id="email" name="email" type="email" placeholder="employee@example.com" required>
                            </div>
                            <div class="form-field">
                                <label for="address">Address</label>
                                <input class="field-control" id="address" name="address" type="text" placeholder="Address">
                            </div>
                            <div class="form-row">
                                <div class="form-field">
                                    <label for="department">Department</label>
                                    <select class="field-select" id="department" name="department" required></select>
                                </div>
                                <div class="form-field">
                                    <label for="password">Temporary Password</label>
                                    <input class="field-control" id="password" name="password" type="password" placeholder="Minimum 8 characters" required>
                                </div>
                            </div>
                            <button class="btn btn-primary" type="submit" data-submit-label>Create Employee</button>
                        </form>
                    </article>
                    <article class="panel-card">
                        <div class="section-head"><div><h2>Employee Directory</h2><p>Edit or delete employee records using the table below.</p></div></div>
                        <div id="employeeTable"></div>
                    </article>
                </section>
            </main>
        </div>
    </div>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/authGuard.js"></script>
    <script src="../../assets/js/employees.js"></script>
</body>
</html>
