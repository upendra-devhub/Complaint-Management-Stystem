<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Complaint</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/animations.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/form.css">
    <link rel="stylesheet" href="../../assets/css/sidebar.css">
    <link rel="stylesheet" href="../../assets/css/table.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body data-role="user" data-page="new-complaint" data-title="Create Complaint">
    <div class="page-backdrop"></div>
    <div id="toast-root"></div>
    <div class="app-shell">
        <aside class="app-sidebar"></aside>
        <div class="app-frame">
            <header class="topbar"></header>
            <main class="page-content">
                <section class="page-title">
                    <span class="eyebrow">Citizen Module</span>
                    <h1>New Complaint</h1>
                </section>
                <section class="two-column">
                    <article class="panel-card">
                        <div class="section-head"><div><h2>Complaint Form</h2></div></div>
                        <form id="complaintCreateForm" class="form-grid">
                            <div class="form-row">
                                <div class="form-field">
                                    <label for="title">Complaint Title</label>
                                    <input class="field-control" id="title" name="title" type="text" placeholder="Street light not working" required>
                                </div>
                                <div class="form-field">
                                    <label for="department">Department</label>
                                    <select class="field-select" id="department" name="department" required></select>
                                </div>
                            </div>
                            <div class="form-field">
                                <label for="location">Location</label>
                                <input class="field-control" id="location" name="location" type="text" placeholder="MG Road, Downtown" required>
                            </div>
                            <div class="form-field">
                                <label for="description">Description</label>
                                <textarea class="field-textarea" id="description" name="description" placeholder="Describe the issue clearly..." required></textarea>
                            </div>
                            <div class="form-field upload-dropzone">
                                <label for="images">Upload Images</label>
                                <input id="images" name="images" type="file" accept="image/*" multiple>
                                <p class="helper-text">You can upload up to 5 images. A preview appears before submission.</p>
                            </div>
                            <button class="btn btn-primary" type="submit">Submit Complaint <i class="bi bi-arrow-right"></i></button>
                        </form>
                    </article>
                    <article class="panel-card">
                        <div class="section-head"><div><h2>Image Preview</h2></div></div>
                        <div class="preview-grid" id="imagePreview"></div>
                    </article>
                </section>
            </main>
        </div>
    </div>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/authGuard.js"></script>
    <script src="../../assets/js/realtime.js"></script>
    <script src="../../assets/js/complaints.js"></script>
</body>
</html>
