<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Dashboard</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/animations.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/form.css">
    <link rel="stylesheet" href="../../assets/css/sidebar.css">
    <link rel="stylesheet" href="../../assets/css/table.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body data-role="user" data-page="dashboard" data-title="Citizen Dashboard">
    <div class="page-backdrop"></div>
    <div id="toast-root"></div>
    <div class="app-shell">
        <aside class="app-sidebar"></aside>
        <div class="app-frame">
            <header class="topbar"></header>
            <main class="page-content">
                <section class="page-title">
                    <span class="eyebrow">Citizen Workspace</span>
                    <h1 id="userWelcomeHeading">Welcome back.</h1>
                </section>
                <section class="card-grid" id="userStatCards"></section>
                <section class="two-column">
                    <article class="panel-card">
                        <div class="section-head"><div><h2>Recent Complaints</h2></div></div>
                        <div class="list-stack" id="userRecentComplaints"></div>
                    </article>
                    <div class="side-stack">
                        <article class="panel-card">
                            <div class="section-head"><div><h2>Quick Actions</h2></div></div>
                            <div class="quick-actions">
                                <a class="quick-action" href="complaint.html"><i class="bi bi-plus-circle"></i><div><strong>File Complaint</strong><p>Create a new complaint.</p></div></a>
                                <a class="quick-action" href="myComplaints.html"><i class="bi bi-clipboard-check"></i><div><strong>View All</strong><p>Review all your complaints.</p></div></a>
                            </div>
                        </article>
                        <article class="panel-card">
                            <div class="section-head"><div><h2>Recent Notifications</h2></div></div>
                            <div class="mini-list" id="userNotifications"></div>
                        </article>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/authGuard.js"></script>
    <script src="../../assets/js/realtime.js"></script>
    <script src="../../assets/js/dashboard.js"></script>
</body>
</html>
