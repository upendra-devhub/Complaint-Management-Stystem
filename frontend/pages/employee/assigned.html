<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assigned Complaints</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/animations.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/form.css">
    <link rel="stylesheet" href="../../assets/css/sidebar.css">
    <link rel="stylesheet" href="../../assets/css/table.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>

<body data-role="employee" data-page="assigned" data-title="Assigned Complaints">
    <div class="page-backdrop"></div>
    <div id="toast-root"></div>
    <div class="app-shell">
        <aside class="app-sidebar"></aside>
        <div class="app-frame">
            <header class="topbar"></header>
            <main class="page-content">
                <section class="page-title">
                    <span class="eyebrow">Employee Module</span>
                    <h1>Assigned Complaints</h1>
                </section>
                <section class="panel-card">
                    <div class="section-head">
                        <div><h2>All Complaints</h2></div>
                        <button class="btn btn-secondary filter-toggle-btn" id="employeeFilterToggleBtn">
                            <i class="bi bi-funnel"></i> Filter
                        </button>
                    </div>
                    <div class="filter-panel" id="employeeFilterPanel">
                        <div class="filter-panel-inner">
                            <div class="filter-group">
                                <span class="filter-group-label">Status</span>
                                <div class="filter-chips" id="employeeStatusFilterChips">
                                    <button class="filter-chip active" data-status="all">All</button>
                                    <button class="filter-chip" data-status="Assigned">
                                        <span class="filter-dot dot-assigned"></span> Assigned
                                    </button>
                                    <button class="filter-chip" data-status="In Progress">
                                        <span class="filter-dot dot-progress"></span> In Progress
                                    </button>
                                    <button class="filter-chip" data-status="Resolved">
                                        <span class="filter-dot dot-resolved"></span> Resolved
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="employeeAssignedTable"></div>
                </section>
            </main>
        </div>
    </div>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/authGuard.js"></script>
    <script src="../../assets/js/realtime.js"></script>
    <script src="../../assets/js/complaints.js"></script>
</body>

</html>
