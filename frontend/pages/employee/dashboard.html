<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/animations.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/form.css">
    <link rel="stylesheet" href="../../assets/css/sidebar.css">
    <link rel="stylesheet" href="../../assets/css/table.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body data-role="employee" data-page="dashboard" data-title="Employee Dashboard">
    <div class="page-backdrop"></div>
    <div id="toast-root"></div>
    <div class="app-shell">
        <aside class="app-sidebar"></aside>
        <div class="app-frame">
            <header class="topbar"></header>
            <main class="page-content reveal">
                <section class="page-title">
                    <span class="eyebrow">Work Overview</span>
                    <h1 id="employeeWelcomeHeading">Welcome back.</h1>
                </section>
                <section class="card-grid" id="employeeStatCards"></section>
                <section class="horizontal-charts">
                    <article class="panel-card chart-panel">
                        <div class="section-head">
                            <div>
                                <h2>Status Breakdown</h2>
                            </div>
                        </div>
                        <div class="chart-canvas-wrap"><canvas id="employeeStatusChart"></canvas></div>
                    </article>
                    <article class="panel-card chart-panel">
                        <div class="section-head">
                            <div>
                                <h2>Priority Mix</h2>
                            </div>
                        </div>
                        <div class="chart-canvas-wrap"><canvas id="employeePriorityChart"></canvas></div>
                    </article>
                </section>
                <section class="panel-card">
                    <div class="section-head">
                        <div>
                            <h2>Recent Assigned Complaints</h2>
                        </div>
                        <a class="btn btn-secondary btn-sm" href="assigned.html">View All <i
                                class="ph ph-arrow-right"></i></a>
                    </div>
                    <div class="list-stack" id="employeeRecentComplaints"></div>
                </section>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/authGuard.js"></script>
    <script src="../../assets/js/realtime.js"></script>
    <script src="../../assets/js/dashboard.js"></script>
    <script src="../../assets/js/scrollHijack.js"></script>
<script src="../../assets/js/animations.js"></script>
</body>

</html>
